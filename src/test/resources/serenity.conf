serenity {
    take.screenshots = FOR_FAILURES
    use.unique.browser = true
    test.root = co.edu.udea.certificacion.taller.shopping
    console.colors = true
    report {
        accessibility = true
    }
    requirement {
        types = "epic, feature"
    }
}

#headless.mode = true

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {

      args = [
        "--incognito",
        "--disable-popup-blocking",
        "--disable-notifications",
        "--disable-infobars",
        "--disable-gpu",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--remote-allow-origins=*"
      ]

      prefs = {
        "credentials_enable_service" = false
        "profile.password_manager_enabled" = false
        "autofill.profile_enabled" = false
        "autofill.credit_card_enabled" = false
      }
    }
  }
}

chrome.switches = """
--start-maximized;
--incognito;
--disable-popup-blocking;
--disable-notifications;
--disable-infobars;
--disable-gpu;
--no-sandbox;
--remote-allow-origins=*;
--disable-dev-shm-usage
"""

pages {
    swaglabsUrl = "https://www.google.com/"
    automationExercisePage = "https://automationexercise.com/"
}

custom{
    debug{
        delay = 100
    }
}

webdriver.base.url = "https://automationexercise.com/"